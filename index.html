<!DOCTYPE html>
<html lang="es" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['JetBrains Mono', 'Courier New', 'monospace'],
            mono: ['JetBrains Mono', 'Courier New', 'monospace'],
          },
          colors: {
            background: '#000000',
            surface: '#0a0a0a',
            border: '#27272a',
            primary: '#cc0000', // esoteria red
            secondary: '#9ca3af', // gray-400
            accent: '#cc0000', // esoteria red
          },
          animation: {
            'blink': 'blink 1s step-end infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
          },
          keyframes: {
            blink: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0' },
            },
            glow: {
              '0%': { boxShadow: '0 0 20px rgba(204, 0, 0, 0.4)' },
              '100%': { boxShadow: '0 0 40px rgba(204, 0, 0, 0.6)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {

    }

    ::-webkit-scrollbar-track {
      background: #000000;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
